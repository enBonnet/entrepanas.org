name: Deploy to Cloudflare

# Auto-deploy on every push to main (i.e. after a PR merge).
on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

# One deploy at a time; cancel older in-flight runs for the same branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 3a1bc7f182750ece2bf1becab111b0b6
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # Apply pending D1 schema migrations to prod before the new code goes live.
      # seed.sql lives in scripts/, NOT ./drizzle, so it is never applied here.
      - run: npx wrangler d1 migrations apply entrepanas --remote

      - run: npx wrangler deploy
